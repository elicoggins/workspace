name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release
        run: cargo build --release